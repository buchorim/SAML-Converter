<!DOCTYPE html>
<!-- / - Arinara Network © 2026 - / -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SML Verter — SVG to Alight Motion XML</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f13;
      color: #e0e0e6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #fff;
    }
    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 32px;
    }
    .drop-zone {
      width: 100%;
      max-width: 520px;
      border: 2px dashed #333;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #16161c;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #7c5cfc;
      background: #1a1a26;
    }
    .drop-zone p { color: #999; font-size: 14px; }
    .drop-zone .browse { color: #7c5cfc; text-decoration: underline; cursor: pointer; }
    .file-list {
      width: 100%;
      max-width: 520px;
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .file-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1a1a24;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
    }
    .file-item .name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-item .size { color: #666; font-size: 12px; flex-shrink: 0; }
    .file-item .status { font-size: 12px; flex-shrink: 0; }
    .file-item .status.ok { color: #4ade80; }
    .file-item .status.err { color: #f87171; }
    .file-item .remove {
      background: none; border: none; color: #555; cursor: pointer;
      font-size: 16px; padding: 0 4px; line-height: 1;
    }
    .file-item .remove:hover { color: #f87171; }
    .progress-bar {
      width: 100%;
      max-width: 520px;
      height: 6px;
      background: #222;
      border-radius: 3px;
      margin-top: 16px;
      overflow: hidden;
      display: none;
    }
    .progress-bar .fill {
      height: 100%;
      background: #7c5cfc;
      border-radius: 3px;
      width: 0%;
      transition: width 0.15s;
    }
    .actions {
      width: 100%;
      max-width: 520px;
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }
    button.convert {
      flex: 1;
      padding: 12px 0;
      border: none;
      border-radius: 8px;
      background: #7c5cfc;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button.convert:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    button.convert:hover:not(:disabled) { opacity: 0.85; }
    button.clear {
      padding: 12px 20px;
      border: 1px solid #333;
      border-radius: 8px;
      background: transparent;
      color: #aaa;
      font-size: 14px;
      cursor: pointer;
    }
    button.clear:hover { border-color: #555; color: #fff; }
    .info {
      margin-top: 14px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>SML Verter</h1>
  <p class="subtitle">SVG → Alight Motion XML Converter</p>

  <div class="drop-zone" id="dropZone">
    <p>Drag & drop SVG files here<br>or <span class="browse">browse files</span></p>
    <p style="margin-top:8px;font-size:12px;color:#555;">Up to 30 files</p>
    <input type="file" id="fileInput" accept=".svg" multiple hidden>
  </div>

  <div class="file-list" id="fileList"></div>
  <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>

  <div class="actions">
    <button class="convert" id="convertBtn" disabled>Convert</button>
    <button class="clear" id="clearBtn">Clear</button>
  </div>

  <p class="info" id="info"></p>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="SmlVerter.js"></script>
  <script>
    const MAX_FILES = 30;
    let files = [];

    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const fileList = document.getElementById("fileList");
    const progressBar = document.getElementById("progressBar");
    const progressFill = document.getElementById("progressFill");
    const convertBtn = document.getElementById("convertBtn");
    const clearBtn = document.getElementById("clearBtn");
    const info = document.getElementById("info");

    dropZone.addEventListener("click", () => fileInput.click());
    dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      addFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener("change", () => { addFiles(fileInput.files); fileInput.value = ""; });
    clearBtn.addEventListener("click", clearAll);
    convertBtn.addEventListener("click", convert);

    function addFiles(newFiles) {
      for (const f of newFiles) {
        if (files.length >= MAX_FILES) { info.textContent = "Maximum 30 files."; break; }
        if (!f.name.toLowerCase().endsWith(".svg")) continue;
        if (files.some(x => x.name === f.name)) continue;
        files.push(f);
      }
      renderList();
    }

    function removeFile(index) {
      files.splice(index, 1);
      renderList();
    }

    function clearAll() {
      files = [];
      renderList();
      progressBar.style.display = "none";
      progressFill.style.width = "0%";
      info.textContent = "";
    }

    function renderList() {
      fileList.innerHTML = "";
      files.forEach((f, i) => {
        const div = document.createElement("div");
        div.className = "file-item";
        div.innerHTML = `
          <span class="name">${f.name}</span>
          <span class="size">${(f.size / 1024).toFixed(1)} KB</span>
          <span class="status" id="status-${i}"></span>
          <button class="remove" data-i="${i}">&times;</button>`;
        fileList.appendChild(div);
      });
      fileList.querySelectorAll(".remove").forEach(btn => {
        btn.addEventListener("click", (e) => removeFile(Number(e.target.dataset.i)));
      });
      convertBtn.disabled = files.length === 0;
    }

    async function convert() {
      if (files.length === 0) return;
      convertBtn.disabled = true;
      progressBar.style.display = "block";
      progressFill.style.width = "0%";
      info.textContent = "Converting...";

      const results = [];
      for (let i = 0; i < files.length; i++) {
        const statusEl = document.getElementById(`status-${i}`);
        try {
          const text = await files[i].text();
          const result = window.SmlVerter.convertSvgToXml(text, files[i].name);
          results.push(result);
          if (statusEl) { statusEl.textContent = "✓"; statusEl.className = "status ok"; }
        } catch (err) {
          if (statusEl) { statusEl.textContent = "✗ " + err.message.slice(0, 40); statusEl.className = "status err"; }
        }
        progressFill.style.width = `${((i + 1) / files.length * 100).toFixed(0)}%`;
      }

      if (results.length === 0) {
        info.textContent = "No files converted successfully.";
        convertBtn.disabled = false;
        return;
      }

      if (results.length === 1) {
        downloadFile(results[0].filename, results[0].xml, "application/xml");
        info.textContent = `Done — downloaded ${results[0].filename}`;
      } else {
        const zip = new JSZip();
        for (const r of results) zip.file(r.filename, r.xml);
        const blob = await zip.generateAsync({ type: "blob" });
        downloadBlob("SML_Verter_Export.zip", blob);
        info.textContent = `Done — downloaded ${results.length} files as ZIP`;
      }
      convertBtn.disabled = false;
    }

    function downloadFile(name, content, type) {
      const blob = new Blob([content], { type });
      downloadBlob(name, blob);
    }

    function downloadBlob(name, blob) {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = name;
      a.click();
      URL.revokeObjectURL(a.href);
    }
  </script>
</body>
</html>
